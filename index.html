<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Glassmorphism Website</title>
    <style>
/* Google Font */

@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap');

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins',sans-serif;
}

body{

    min-height:100vh;

    overflow:hidden;

    display:flex;

    flex-direction:column;

    justify-content:center;

    align-items:center;

    background:linear-gradient(
    135deg,
    #4facfe,
    #00f2fe,
    #8e44ad
    );

    position:relative;

}

/* Background circles */

.bg-circle{

    position:absolute;

    border-radius:50%;

    filter:blur(20px);

}

.circle1{

    width:320px;
    height:320px;

    background:#ffffff55;

    top:60px;
    left:80px;

}

.circle2{

    width:420px;
    height:420px;

    background:#ff00aa33;

    bottom:40px;
    right:60px;

}

/* Navbar */

header{

    position:absolute;

    top:30px;

    width:90%;

}

nav{

    display:flex;

    justify-content:space-between;

    align-items:center;

    padding:18px 35px;

    border-radius:20px;

    background:rgba(255,255,255,.15);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.25);

}

nav h2{

    color:white;

}

nav ul{

    display:flex;

    gap:30px;

    list-style:none;

}

nav a{

    text-decoration:none;

    color:white;

    transition:.3s;

}

nav a:hover{

    opacity:.7;

}

/* Hero */

.hero{

    display:flex;

    justify-content:center;

    align-items:center;

    width:100%;

    height:100vh;

}

/* Glass Card */

.glass-card{

    width:700px;

    padding:60px;

    text-align:center;

    border-radius:25px;

    background:rgba(255,255,255,.12);

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
    0 15px 40px rgba(0,0,0,.2);

    transition:.4s;

}

.glass-card:hover{

    transform:translateY(-10px);

    box-shadow:
    0 25px 60px rgba(0,0,0,.3);

}

.glass-card h1{

    font-size:55px;

    color:white;

    margin-bottom:20px;

}

.glass-card p{

    color:white;

    font-size:18px;

    line-height:1.8;

    margin-bottom:40px;

}

/* Buttons */

.buttons{

    display:flex;

    justify-content:center;

    gap:20px;

}

.btn{

    padding:15px 35px;

    border-radius:50px;

    text-decoration:none;

    background:white;

    color:#333;

    font-weight:600;

    transition:.3s;

}

.btn:hover{

    transform:scale(1.05);

}

.outline{

    background:transparent;

    color:white;

    border:2px solid white;

}

.outline:hover{

    background:white;

    color:#333;

}

/* Responsive */

@media(max-width:768px){

nav{

    flex-direction:column;

    gap:20px;

}

nav ul{

    flex-wrap:wrap;

    justify-content:center;

}

.glass-card{

    width:90%;

    padding:40px 25px;

}

.glass-card h1{

    font-size:36px;

}

.buttons{

    flex-direction:column;

}

body{

    overflow:auto;

}

}
</style>
</head>
<body>

<div class="bg-circle circle1"></div>
<div class="bg-circle circle2"></div>

<header>

<nav>

<h2>GlassUI</h2>

<ul>
<li><a href="#">Home</a></li>
<li><a href="#">About</a></li>
<li><a href="#">Services</a></li>
<li><a href="#">Contact</a></li>
</ul>

</nav>

</header>

<section class="hero">

<div class="glass-card">

<h1>Create Beautiful Websites</h1>

<p>
Build modern, elegant websites with Glassmorphism using only HTML and CSS.
</p>

<div class="buttons">

<a href="#" class="btn">Get Started</a>

<a href="#" class="btn outline">Learn More</a>

</div>

</div>

</section>

</body>
</html>
